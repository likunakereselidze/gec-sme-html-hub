<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>მონაწილეები — GEC SME Program</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#15374a;--orange:#f05324;--teal:#049978;--gold:#f0b91c;--bg:#f4f2ea;--border:#e0dbd0}
body{font-family:'Noto Sans Georgian',-apple-system,sans-serif;background:var(--bg);color:#1a1a1a;min-height:100vh}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:#fff;border-radius:12px;box-shadow:0 4px 32px rgba(0,0,0,0.1);width:100%;max-width:380px;overflow:hidden}
.login-top{background:var(--navy);padding:32px;text-align:center;border-bottom:4px solid var(--orange)}
.login-top h1{color:#fff;font-size:20px;font-weight:800;margin-top:12px}
.login-top p{color:rgba(255,255,255,.55);font-size:13px;margin-top:6px}
.login-body{padding:28px}
.login-body label{display:block;font-size:11px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.login-body input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:15px;color:#1a1a1a;background:#fafaf8}
.login-body input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(21,55,74,.08)}
.login-body button{width:100%;margin-top:16px;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.02em}
.login-body button:hover{background:#d94718}
.login-error{color:#e53e3e;font-size:13px;margin-top:10px;text-align:center;display:none}

/* DASHBOARD */
#dashboard{display:none}
.topbar{background:var(--navy);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;border-bottom:3px solid var(--orange)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar h1{color:#fff;font-size:16px;font-weight:800}
.topbar-badge{background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.topbar-right{display:flex;align-items:center;gap:12px}
.export-btn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);padding:7px 16px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.04em;text-transform:uppercase}
.export-btn:hover{background:rgba(255,255,255,.2)}
.logout-btn{color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;background:none;border:none;font-family:inherit}
.logout-btn:hover{color:#fff}

.stats-bar{display:flex;gap:12px;padding:20px 24px;flex-wrap:wrap}
.stat{background:#fff;border-radius:8px;padding:16px 20px;min-width:140px;border:1px solid var(--border);border-left:4px solid var(--orange)}
.stat.teal{border-left-color:var(--teal)}
.stat.gold{border-left-color:var(--gold)}
.stat .val{font-size:28px;font-weight:800;color:var(--navy)}
.stat .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

.toolbar{padding:0 24px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:14px;background:#fff}
.search-wrap input:focus{outline:none;border-color:var(--navy)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa}
.filter-select{padding:9px 14px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;background:#fff;color:#333}
.filter-select:focus{outline:none;border-color:var(--navy)}

.table-wrap{padding:0 24px 40px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06);font-size:13px}
thead tr{background:var(--navy)}
thead th{color:rgba(255,255,255,.75);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:11px 14px;text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0ece4;transition:background .1s}
tbody tr:hover{background:#fdf9f5}
tbody td{padding:12px 14px;vertical-align:top;color:#1a1a1a}
.td-name{font-weight:600;color:var(--navy)}
.td-company{color:#555}
.td-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:#e8f5f0;color:var(--teal)}
.td-date{color:#aaa;font-size:11px;white-space:nowrap}
.td-motivation{max-width:260px;color:#555;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-detail{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:11px;font-family:inherit;cursor:pointer;color:var(--navy);font-weight:600}
.btn-detail:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

.empty{text-align:center;padding:60px 20px;color:#aaa}
.empty svg{margin-bottom:12px;opacity:.4}
.empty p{font-size:15px}

/* DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.2)}
.modal-head{background:var(--navy);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--orange);position:sticky;top:0}
.modal-head h3{color:#fff;font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;cursor:pointer;line-height:1}
.modal-close:hover{color:#fff}
.modal-body{padding:24px}
.detail-row{display:flex;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0ece4}
.detail-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.detail-key{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;min-width:140px;padding-top:2px}
.detail-val{font-size:14px;color:#1a1a1a;line-height:1.5;flex:1}

@media(max-width:600px){
  .stats-bar{gap:8px}
  .stat{min-width:calc(50% - 4px)}
  .table-wrap{padding:0 12px 40px}
  thead th:nth-child(4),thead th:nth-child(5),tbody td:nth-child(4),tbody td:nth-child(5){display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-top">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <h1>მონაწილეთა პანელი</h1>
      <p>GEC SME ბიზნესის განვითარების პროგრამა</p>
    </div>
    <div class="login-body">
      <label>პაროლი</label>
      <input type="password" id="pw-input" placeholder="შეიყვანეთ პაროლი" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">შესვლა →</button>
      <div class="login-error" id="login-error">პაროლი არასწორია</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <h1>მონაწილეები</h1>
      <span class="topbar-badge" id="count-badge">0</span>
    </div>
    <div class="topbar-right">
      <button class="export-btn" onclick="exportCSV()">CSV ექსპორტი</button>
      <button class="logout-btn" onclick="logout()">გასვლა</button>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><div class="val" id="stat-total">0</div><div class="lbl">სულ განაცხადი</div></div>
    <div class="stat teal"><div class="val" id="stat-today">0</div><div class="lbl">დღეს</div></div>
    <div class="stat gold"><div class="val" id="stat-sector">—</div><div class="lbl">გავრცელებული სექტორი</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="ძებნა სახელით, კომპანიით, ელ-ფოსტით..." oninput="renderTable()">
    </div>
    <select class="filter-select" id="filter-sector" onchange="renderTable()">
      <option value="">ყველა სექტორი</option>
    </select>
    <select class="filter-select" id="filter-employees" onchange="renderTable()">
      <option value="">ყველა ზომა</option>
      <option>7 – 10</option>
      <option>11 – 25</option>
      <option>26 – 50</option>
      <option>51 – 100</option>
      <option>100+</option>
    </select>
  </div>

  <div class="table-wrap">
    <table id="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>სახელი და გვარი</th>
          <th>კომპანია</th>
          <th>სექტორი</th>
          <th>თანამშრ.</th>
          <th>ტელეფონი</th>
          <th>ელ-ფოსტა</th>
          <th>წყარო</th>
          <th>თარიღი</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty" id="empty-state" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <p>განაცხადები არ მოიძებნა</p>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">განაცხადის დეტალები</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API = '/api/submissions';
let allData = [];
let sessionPw = '';

const FIELD_LABELS = {
  'სახელი და გვარი': 'სახელი და გვარი',
  'ტელეფონი': 'ტელეფონი',
  'ელ-ფოსტა': 'ელ-ფოსტა',
  'კომპანიის სახელი': 'კომპანია',
  'სექტორი': 'სექტორი',
  'თანამშრომლები': 'თანამშრომლები',
  'ზრდის პოტენციალი': 'ზრდის პოტენციალი',
  'საინფორმაციო წყარო': 'საიდან გაიგეს',
  'თანხმობა': 'თანხმობა',
  '_submitted': 'გაგზავნის თარიღი',
};

const DEMO_DATA = [
  {'_id':1,'სახელი და გვარი':'გიორგი მამულაშვილი','ტელეფონი':'+995 599 123 456','ელ-ფოსტა':'g.mamulashvili@techge.com','კომპანიის სახელი':'შპს ტექ სოლუშენი','სექტორი':'ტექნოლოგია / IT','თანამშრომლები':'11 – 25','ზრდის პოტენციალი':'გვინდა გავფართოვდეთ B2B სეგმენტში და გავზარდოთ გაყიდვები 40%-ით.','საინფორმაციო წყარო':'სოციალური ქსელები','თანხმობა':'დათანხმდა','_submitted':'2026-06-01 10:22'},
  {'_id':2,'სახელი და გვარი':'ნინო ბერიძე','ტელეფონი':'+995 577 654 321','ელ-ფოსტა':'n.beridze@trade.ge','კომპანიის სახელი':'შპს ბერი ტრეიდი','სექტორი':'ვაჭრობა / საბითუმო','თანამშრომლები':'26 – 50','ზრდის პოტენციალი':'გვჭირდება ახალი ბაზრების დაპყრობა და ოპერაციების ოპტიმიზაცია.','საინფორმაციო წყარო':'ბანკის RM','თანხმობა':'დათანხმდა','_submitted':'2026-06-02 14:05'},
  {'_id':3,'სახელი და გვარი':'დავით კაპანაძე','ტელეფონი':'+995 555 000 111','ელ-ფოსტა':'d.kapanadze@kapifood.ge','კომპანიის სახელი':'შპს კაპი ფუდი','სექტორი':'მომსახურება','თანამშრომლები':'7 – 10','ზრდის პოტენციალი':'სერვისის ხარისხის გაუმჯობესება და ახალი კლიენტების მოზიდვა.','საინფორმაციო წყარო':'კოლეგა / მეგობარი','თანხმობა':'დათანხმდა','_submitted':'2026-06-03 09:48'},
];

function doLogin() {
  const pw = document.getElementById('pw-input').value;

  // Offline/demo mode — works without server
  if (pw === 'GECsme2026') {
    allData = DEMO_DATA;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    buildFilters();
    renderStats();
    renderTable();
    return;
  }

  fetch(API + '?password=' + encodeURIComponent(pw))
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      sessionPw = pw;
      sessionStorage.setItem('sme_pw', pw);
      allData = data;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      buildFilters();
      renderStats();
      renderTable();
    })
    .catch(() => {
      document.getElementById('login-error').style.display = 'block';
    });
}

function logout() {
  sessionStorage.removeItem('sme_pw');
  location.reload();
}

function buildFilters() {
  const sectors = [...new Set(allData.map(r => r['სექტორი']).filter(Boolean))].sort();
  const sel = document.getElementById('filter-sector');
  sectors.forEach(s => {
    const o = document.createElement('option');
    o.value = o.textContent = s;
    sel.appendChild(o);
  });
}

function renderStats() {
  const today = new Date().toISOString().slice(0,10);
  const todayCount = allData.filter(r => (r._submitted||'').startsWith(today)).length;
  const sectorCounts = {};
  allData.forEach(r => { if (r['სექტორი']) sectorCounts[r['სექტორი']] = (sectorCounts[r['სექტორი']]||0)+1; });
  const topSector = Object.entries(sectorCounts).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-sector').textContent = topSector ? topSector[0].split('/')[0].trim() : '—';
  document.getElementById('count-badge').textContent = allData.length;
}

function renderTable() {
  const q      = document.getElementById('search').value.toLowerCase();
  const sector = document.getElementById('filter-sector').value;
  const emp    = document.getElementById('filter-employees').value;

  let rows = allData.filter(r => {
    const text = [r['სახელი და გვარი'], r['კომპანიის სახელი'], r['ელ-ფოსტა']].join(' ').toLowerCase();
    if (q && !text.includes(q)) return false;
    if (sector && r['სექტორი'] !== sector) return false;
    if (emp && r['თანამშრომლები'] !== emp) return false;
    return true;
  });

  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');

  if (rows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map((r, i) => `
    <tr>
      <td style="color:#bbb;font-size:12px">${r._id || i+1}</td>
      <td class="td-name">${esc(r['სახელი და გვარი'] || '—')}</td>
      <td class="td-company">${esc(r['კომპანიის სახელი'] || '—')}</td>
      <td><span class="td-badge">${esc(r['სექტორი'] || '—')}</span></td>
      <td style="color:#666">${esc(r['თანამშრომლები'] || '—')}</td>
      <td style="color:#444">${esc(r['ტელეფონი'] || '—')}</td>
      <td style="color:#444">${esc(r['ელ-ფოსტა'] || '—')}</td>
      <td style="color:#888;font-size:12px">${esc(r['საინფორმაციო წყარო'] || '—')}</td>
      <td class="td-date">${esc(r._submitted || '—')}</td>
      <td><button class="btn-detail" onclick='showDetail(${JSON.stringify(JSON.stringify(r))})'>დეტალი</button></td>
    </tr>`).join('');
}

function showDetail(jsonStr) {
  const r = JSON.parse(jsonStr);
  document.getElementById('modal-title').textContent = (r['სახელი და გვარი'] || 'განაცხადი') + ' · ' + (r['კომპანიის სახელი'] || '');
  const body = document.getElementById('modal-body');
  const skip = new Set(['_id']);
  body.innerHTML = Object.entries(r)
    .filter(([k]) => !skip.has(k))
    .map(([k, v]) => `
      <div class="detail-row">
        <div class="detail-key">${esc(FIELD_LABELS[k] || k)}</div>
        <div class="detail-val">${esc(v || '—')}</div>
      </div>`).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function exportCSV() {
  if (!allData.length) return;
  const keys = Object.keys(allData[0]).filter(k => k !== '_id');
  const rows = [keys.join(','), ...allData.map(r =>
    keys.map(k => '"' + String(r[k]||'').replace(/"/g,'""') + '"').join(',')
  )];
  const blob = new Blob(['﻿' + rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'GEC_SME_participants_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// Auto-login if session exists
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('sme_pw');
  if (saved) {
    document.getElementById('pw-input').value = saved;
    doLogin();
  }
});
</script>
</body>
</html>
