<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>განაცხადი მიღებულია — GEC SME</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Georgian',sans-serif;background:#F4F2EA;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:480px;width:100%;overflow:hidden;text-align:center}
.top{background:#15374a;padding:40px 32px;border-bottom:4px solid #049978}
.check{width:64px;height:64px;background:#049978;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.top h1{color:#fff;font-size:22px;font-weight:800;line-height:1.3}
.body{padding:32px}
.body p{color:#555;font-size:15px;line-height:1.7;margin-bottom:24px}
.btn{display:inline-block;background:#F05324;color:#fff;text-decoration:none;padding:13px 32px;border-radius:7px;font-weight:700;font-size:14px}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="check">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>განაცხადი წარმატებით გაიგზავნა!</h1>
  </div>
  <div class="body">
    <p>გმადლობთ განაცხადისთვის. ჩვენი გუნდი განიხილავს და მალე დაგიკავშირდებათ.</p>
    <a href="/linktree" class="btn">მთავარ გვერდზე დაბრუნება</a>
  </div>
</div>
</body>
</html>
